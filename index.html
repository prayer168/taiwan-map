<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>台灣 3D 立體地景 · 無人機視角導覽</title>
<style>
  :root{
    --panel-bg: rgba(15,26,40,.82);
    --accent: #3fc1c9;
    --accent2: #ffd166;
    --text: #eef6fb;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; background:#0b1c2c; }
  #app{ position:fixed; inset:0; }
  canvas{ display:block; }

  /* ---------- 左側地景清單 ---------- */
  #panel{
    position:fixed; top:12px; left:12px; bottom:12px; width:210px;
    background:var(--panel-bg); border-radius:16px; color:var(--text);
    display:flex; flex-direction:column; backdrop-filter:blur(6px);
    box-shadow:0 4px 16px rgba(0,0,0,.35); z-index:20;
    transition:transform .3s ease;
  }
  #panel.hidden{ transform:translateX(-240px); }
  #panel h2{ font-size:14px; padding:12px 14px 8px; color:var(--accent2); }
  #list{ flex:1; overflow-y:auto; padding:0 8px 10px; }
  #list::-webkit-scrollbar{ width:5px; } #list::-webkit-scrollbar-thumb{ background:#3b566e; border-radius:3px; }
  .item{
    display:flex; align-items:center; gap:8px;
    padding:7px 8px; border-radius:10px; cursor:pointer; font-size:13px;
    transition:background .15s;
  }
  .item:hover{ background:rgba(255,255,255,.1); }
  .item.active{ background:rgba(63,193,201,.25); outline:1px solid var(--accent); }
  .item .county{ font-size:10px; color:#9fc1d4; background:rgba(255,255,255,.08); border-radius:6px; padding:2px 5px; flex:none; min-width:44px; text-align:center; }

  #panelToggle{
    position:fixed; top:12px; left:12px; z-index:21;
    width:38px; height:38px; border-radius:12px; border:none;
    background:var(--panel-bg); color:var(--text); font-size:18px; cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.35); display:none;
  }

  /* ---------- 右上操作按鈕 ---------- */
  #actions{ position:fixed; top:12px; right:12px; z-index:20; display:flex; flex-direction:column; gap:8px; }
  .btn{
    background:var(--panel-bg); color:var(--text); border:none; border-radius:12px;
    padding:9px 14px; font-size:13px; cursor:pointer; backdrop-filter:blur(6px);
    box-shadow:0 4px 12px rgba(0,0,0,.35); transition:background .15s; text-align:left;
    font-family:inherit;
  }
  .btn:hover{ background:rgba(63,193,201,.35); }
  .btn.on{ background:rgba(63,193,201,.45); outline:1px solid var(--accent); }

  /* ---------- 資訊卡 ---------- */
  #info{
    position:fixed; right:12px; bottom:12px; width:280px; max-width:calc(100vw - 24px);
    background:var(--panel-bg); border-radius:16px; color:var(--text);
    padding:14px 16px; backdrop-filter:blur(6px); z-index:20;
    box-shadow:0 4px 16px rgba(0,0,0,.35); display:none;
  }
  #info.show{ display:block; }
  #info .county{ font-size:11px; color:#0b1c2c; background:var(--accent2); border-radius:6px; padding:2px 8px; display:inline-block; }
  #info h3{ font-size:17px; margin:6px 0 6px; color:#fff; }
  #info p{ font-size:12.5px; line-height:1.7; color:#cfe3ee; }
  #info .close{ position:absolute; top:8px; right:12px; cursor:pointer; color:#89a9bc; font-size:16px; border:none; background:none; }

  /* ---------- 底部操作說明 ---------- */
  #help{
    position:fixed; left:50%; bottom:10px; transform:translateX(-50%);
    background:var(--panel-bg); color:#bcd6e4; font-size:11.5px;
    padding:6px 16px; border-radius:12px; z-index:19; pointer-events:none;
    backdrop-filter:blur(6px); white-space:nowrap;
  }

  /* ---------- 速度滑桿 ---------- */
  #speedBox{
    position:fixed; right:12px; top:172px; z-index:20;
    background:var(--panel-bg); border-radius:12px; padding:8px 12px;
    color:var(--text); font-size:11px; text-align:center; backdrop-filter:blur(6px);
  }
  #speedBox input{ width:90px; accent-color:var(--accent); }

  /* ---------- 手機虛擬搖桿 ---------- */
  .stick{ position:fixed; width:110px; height:110px; border-radius:50%;
    border:2px solid rgba(255,255,255,.35); background:rgba(255,255,255,.06);
    z-index:30; display:none; pointer-events:none; }
  .stick .knob{ position:absolute; left:50%; top:50%; width:46px; height:46px; border-radius:50%;
    background:rgba(63,193,201,.55); transform:translate(-50%,-50%); }
  #altBtns{ position:fixed; right:14px; bottom:120px; z-index:25; display:none; flex-direction:column; gap:10px; }
  #altBtns button{ width:52px; height:52px; border-radius:50%; border:none; font-size:20px;
    background:var(--panel-bg); color:var(--text); box-shadow:0 4px 12px rgba(0,0,0,.35); }

  #loading{
    position:fixed; inset:0; background:#0b1c2c; z-index:99;
    display:flex; align-items:center; justify-content:center; color:#9fc1d4;
    font-size:15px; letter-spacing:2px; transition:opacity .5s;
  }

  @media (max-width: 820px){
    #panel{ width:190px; }
    #panelToggle{ display:block; }
    #panel.hidden ~ #panelToggle{ display:block; }
    #help{ display:none; }
    #speedBox{ display:none; }
    #actions{ flex-direction:row; top:auto; bottom:12px; right:auto; left:50%; transform:translateX(-50%); }
    .btn{ padding:8px 10px; font-size:12px; }
    #info{ bottom:64px; }
    #altBtns{ display:flex; }
  }
</style>
</head>
<body>
<div id="app"></div>

<button id="panelToggle">☰</button>
<div id="panel">
  <h2>📍 各縣市著名地景（22）</h2>
  <div id="list"></div>
</div>

<div id="actions">
  <button class="btn" id="btnTour">▶️ 自動導覽</button>
  <button class="btn" id="btnOrbit">🔄 環繞模式</button>
  <button class="btn" id="btnHome">🏝️ 全島鳥瞰</button>
</div>

<div id="speedBox">
  飛行速度<br>
  <input type="range" id="speed" min="0.3" max="4" step="0.1" value="1">
</div>

<div id="info">
  <button class="close" id="infoClose">✕</button>
  <span class="county" id="infoCounty"></span>
  <h3 id="infoName"></h3>
  <p id="infoDesc"></p>
</div>

<div id="help">滑鼠拖曳：轉動視角　｜　W/A/S/D：飛行　｜　Space：上升　Shift：下降　｜　滾輪：前進後退　｜　點擊地景：查看介紹</div>

<div class="stick" id="stick"><div class="knob" id="knob"></div></div>
<div id="altBtns">
  <button id="altUp">▲</button>
  <button id="altDown">▼</button>
</div>

<div id="loading">正在建立台灣島嶼…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   台灣 3D 立體地景 · 無人機視角
   座標系：x = (經度-121)×120，z = (23.6-緯度)×120，y 向上
   ========================================================= */
"use strict";

const W = () => window.innerWidth, H = () => window.innerHeight;
const X = lon => (lon - 121.0) * 120;
const Z = lat => (23.6 - lat) * 120;
const GROUND_Y = 6.8;   // 島上地面高度
const SEA_Y    = 1.2;   // 海平面

/* ---------- 基本場景 ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd0f0);
scene.fog = new THREE.Fog(0x9fd0f0, 700, 2200);

const camera = new THREE.PerspectiveCamera(55, W()/H(), 0.5, 4000);
camera.position.set(40, 300, 380);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById("app").appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x3f7d4e, 0.85));
const sun = new THREE.DirectionalLight(0xfff2d9, 1.15);
sun.position.set(260, 420, 160);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const SC = 420;
sun.shadow.camera.left=-SC; sun.shadow.camera.right=SC;
sun.shadow.camera.top=SC; sun.shadow.camera.bottom=-SC;
sun.shadow.camera.far = 1200;
scene.add(sun);

/* ---------- 材質小工具 ---------- */
const MAT = {};
function mat(color, opt={}){
  const key = color + JSON.stringify(opt);
  if(!MAT[key]) MAT[key] = new THREE.MeshStandardMaterial(Object.assign({ color, roughness:.85, metalness:.05, flatShading:true }, opt));
  return MAT[key];
}
function mesh(geo, color, opt){
  const m = new THREE.Mesh(geo, mat(color, opt));
  m.castShadow = true; m.receiveShadow = true;
  return m;
}
const box  = (w,h,d,c,o) => mesh(new THREE.BoxGeometry(w,h,d), c, o);
const cyl  = (rt,rb,h,c,seg=10,o) => mesh(new THREE.CylinderGeometry(rt,rb,h,seg), c, o);
const cone = (r,h,c,seg=8,o) => mesh(new THREE.ConeGeometry(r,h,seg), c, o);
const ball = (r,c,seg=10,o) => mesh(new THREE.SphereGeometry(r,seg,seg), c, o);

/* ---------- 海 ---------- */
const sea = new THREE.Mesh(
  new THREE.PlaneGeometry(3600, 3600, 60, 60),
  new THREE.MeshStandardMaterial({ color:0x1e77b5, roughness:.55, metalness:.15, transparent:true, opacity:.93, flatShading:true })
);
sea.rotation.x = -Math.PI/2;
sea.position.y = SEA_Y;
sea.receiveShadow = true;
scene.add(sea);
const seaPos = sea.geometry.attributes.position;
const seaBase = seaPos.array.slice();

const deepSea = new THREE.Mesh(new THREE.PlaneGeometry(3600,3600), mat(0x0d3f66));
deepSea.rotation.x = -Math.PI/2; deepSea.position.y = -1.5;
scene.add(deepSea);

/* ---------- 台灣本島 ---------- */
const coast = [ // [經度, 緯度] 順時針
  [121.73,25.30],[121.93,25.13],[122.00,25.01],[121.83,24.85],[121.87,24.55],
  [121.82,24.30],[121.65,24.00],[121.62,23.75],[121.52,23.35],[121.42,23.10],
  [121.20,22.75],[121.00,22.30],[120.90,22.00],[120.86,21.90],[120.74,21.95],
  [120.70,22.15],[120.52,22.40],[120.45,22.55],[120.30,22.55],[120.17,22.85],
  [120.08,23.05],[120.10,23.35],[120.13,23.60],[120.25,23.85],[120.32,24.05],
  [120.47,24.20],[120.52,24.40],[120.68,24.65],[120.85,24.90],[121.00,25.05],
  [121.20,25.12],[121.40,25.18],[121.58,25.28]
];
const shape = new THREE.Shape();
coast.forEach(([lon,lat],i)=>{
  const x = X(lon), y = (lat-23.6)*120; // shape 平面：y 向北
  i===0 ? shape.moveTo(x,y) : shape.lineTo(x,y);
});
shape.closePath();
const islandGeo = new THREE.ExtrudeGeometry(shape, {
  depth:4.5, bevelEnabled:true, bevelThickness:2, bevelSize:3, bevelSegments:2, curveSegments:4
});
islandGeo.rotateX(-Math.PI/2);
const island = new THREE.Mesh(islandGeo, new THREE.MeshStandardMaterial({ color:0x67a95c, roughness:.9, flatShading:true }));
island.castShadow = true; island.receiveShadow = true;
scene.add(island);

/* ---------- 中央山脈（低多邊形山群） ---------- */
const ridge = [ // [經度, 緯度, 高, 半徑]
  [121.35,24.55,20,15],[121.23,24.38,26,17],[121.10,24.20,23,18],
  [121.05,23.95,26,19],[120.96,23.47,36,18],[120.95,23.70,29,19],
  [120.90,23.20,27,18],[120.86,22.90,24,17],[120.80,22.60,20,15],
  [120.78,22.30,15,12],[121.40,23.90,15,11],[121.30,23.45,14,11],[121.18,23.05,13,10]
];
const mountains = new THREE.Group();
function addMountain(lon,lat,h,r,c){
  const m = cone(r, h, c, 7);
  m.position.set(X(lon), 4.5 + h/2 - 1.2, Z(lat));
  mountains.add(m);
}
ridge.forEach(([lon,lat,h,r])=>{
  const c = h > 30 ? 0x8a7f6a : (h > 22 ? 0x5f7d4a : 0x4f8a4f);
  addMountain(lon,lat,h,r,c);
  if(h > 30){ // 玉山雪帽
    const cap = cone(r*0.32, h*0.28, 0xf4f8fa, 7);
    cap.position.set(X(lon), 4.5 + h - h*0.14 - 1.2, Z(lat));
    mountains.add(cap);
  }
});
// 丘陵散布
let seed = 7;
const rnd = () => (seed = (seed*16807)%2147483647) / 2147483647;
for(let i=0;i<26;i++){
  const t = rnd();
  const baseLon = 120.85 + t*0.5, baseLat = 22.3 + rnd()*2.2;
  const h = 6 + rnd()*9, r = 5 + rnd()*7;
  addMountain(baseLon + (rnd()-.5)*0.25, baseLat + (rnd()-.5)*0.15, h, r, rnd()>.5?0x5c8f52:0x6fa35b);
}
scene.add(mountains);

/* ---------- 動畫註冊表 ---------- */
const anims = [];
const onFrame = fn => anims.push(fn);

/* ---------- 文字標籤（Sprite） ---------- */
function makeLabel(text){
  const cv = document.createElement("canvas");
  cv.width = 512; cv.height = 128;
  const g = cv.getContext("2d");
  g.font = "bold 58px 'Noto Sans TC','Microsoft JhengHei',sans-serif";
  const tw = g.measureText(text).width;
  const bw = tw + 70;
  g.fillStyle = "rgba(10,25,40,.78)";
  const rx = (512-bw)/2;
  g.beginPath(); g.roundRect ? g.roundRect(rx, 18, bw, 92, 24) : g.rect(rx,18,bw,92); g.fill();
  g.strokeStyle = "rgba(120,220,230,.7)"; g.lineWidth = 4; g.stroke();
  g.fillStyle = "#ffffff"; g.textAlign="center"; g.textBaseline="middle";
  g.fillText(text, 256, 66);
  const tex = new THREE.CanvasTexture(cv);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false }));
  sp.scale.set(30, 7.5, 1);
  sp.renderOrder = 999;
  return sp;
}

/* =========================================================
   22 縣市地景模型
   ========================================================= */
function padDisc(r, c=0x8fbf72){ // 地景基座
  const d = cyl(r, r*1.15, 1.4, c, 14);
  d.position.y = 0.7;
  return d;
}

const builders = {

  taipei101(){ // 台北101
    const g = new THREE.Group();
    g.add(padDisc(10, 0x9aa9b2));
    for(let i=0;i<8;i++){
      const s = 3.4 - i*0.12;
      const seg = box(s, 2.1, s, 0x3f8f86, { metalness:.5, roughness:.3 });
      seg.position.y = 2.2 + i*2.1;
      seg.rotation.y = 0.06;
      g.add(seg);
    }
    const top = box(2.2, 2, 2.2, 0x4aa79b, { metalness:.5, roughness:.3 }); top.position.y = 19.6; g.add(top);
    const spire = cyl(0.12, 0.3, 5, 0xd8e6ea, 6); spire.position.y = 23; g.add(spire);
    for(let i=0;i<7;i++){ // 周邊市區
      const h = 2 + rnd()*4;
      const b = box(1.6+rnd(), h, 1.6+rnd(), [0xb8c4cc,0x9fb2bd,0xcdd8de][i%3]);
      const a = i/7*Math.PI*2;
      b.position.set(Math.cos(a)*7.5, 1.4+h/2, Math.sin(a)*7.5);
      g.add(b);
    }
    return g;
  },

  queenshead(){ // 野柳女王頭
    const g = new THREE.Group();
    g.add(padDisc(8, 0xd9c391));
    const neck = cyl(0.9, 1.8, 5, 0xcaa96b, 9); neck.position.y = 3.9; g.add(neck);
    const head = ball(2.6, 0xd4b478, 8); head.scale.set(1.15, 0.85, 1); head.position.set(0.7, 7.2, 0); g.add(head);
    const bun = ball(1.2, 0xc9a768, 7); bun.position.set(-0.9, 8.4, 0); g.add(bun);
    for(let i=0;i<4;i++){ // 蕈狀岩群
      const r1 = cyl(0.5,0.9,2.2,0xcaa96b,7); r1.position.set(-4+i*2.6, 2.5, 3.2 - (i%2)*6);
      const r2 = ball(1.1, 0xd4b478, 7); r2.scale.y=.7; r2.position.set(-4+i*2.6, 3.9, 3.2 - (i%2)*6);
      g.add(r1, r2);
    }
    return g;
  },

  keelung(){ // 基隆港
    const g = new THREE.Group();
    g.add(padDisc(10, 0x9aa9b2));
    const dock = box(16, 1.2, 6, 0x8b9aa4); dock.position.set(0, 1.8, -2); g.add(dock);
    // 貨櫃橋式起重機
    for(const dx of [-4, 3]){
      const leg1 = box(.5,6,.5,0xe07840), leg2 = box(.5,6,.5,0xe07840);
      leg1.position.set(dx-1.4, 5.4, -2); leg2.position.set(dx+1.4, 5.4, -2);
      const arm = box(.6,.6,9,0xe07840); arm.position.set(dx, 8.4, 0);
      g.add(leg1, leg2, arm);
    }
    // 貨輪
    const hull = box(9, 1.6, 3, 0x33475c); hull.position.set(0, 1.6, 5);
    const bri  = box(1.6, 2.2, 2.2, 0xe8eef2); bri.position.set(-3.2, 3.4, 5);
    g.add(hull, bri);
    for(let i=0;i<4;i++){
      const c = box(1.6,1,1.4,[0xd9534f,0x5bc0de,0xf0ad4e,0x5cb85c][i]);
      c.position.set(-0.6+i*1.7, 2.9, 5); g.add(c);
    }
    onFrame(t=>{ hull.position.x = Math.sin(t*0.3)*0.6; bri.position.x = -3.2 + Math.sin(t*0.3)*0.6; });
    return g;
  },

  airport(){ // 桃園國際機場
    const g = new THREE.Group();
    g.add(padDisc(13, 0x9fae87));
    const rw = box(22, .5, 4.5, 0x5a6772); rw.position.y = 1.5; g.add(rw);
    for(let i=0;i<5;i++){ const s = box(2,.06,.5,0xf2f2f2); s.position.set(-8+i*4, 1.8, 0); g.add(s); }
    const tw = cyl(1,1.3,7,0xd8e2e8,8); tw.position.set(0,5,-6.5);
    const twTop = cyl(1.9,1.4,1.8,0x4aa3c7,8,{metalness:.4,roughness:.3}); twTop.position.set(0,8.8,-6.5);
    g.add(tw, twTop);
    // 飛機（環繞飛行）
    const plane = new THREE.Group();
    const body = cyl(.5,.5,6,0xf5f8fa,8); body.rotation.z = Math.PI/2;
    const nose = ball(.5,0xf5f8fa,8); nose.position.x = 3;
    const wing = box(1.2,.15,7,0xd0dbe2); const tail = box(1,.15,2.4,0xd0dbe2); tail.position.set(-2.6,.7,0);
    const fin  = box(.9,1.4,.15,0x2a7fb5); fin.position.set(-2.8,.8,0);
    plane.add(body,nose,wing,tail,fin);
    g.add(plane);
    onFrame(t=>{
      const a = t*0.5;
      plane.position.set(Math.cos(a)*20, 15+Math.sin(t*0.8)*1.2, Math.sin(a)*20);
      plane.rotation.y = -a - Math.PI/2 + Math.PI;
    });
    return g;
  },

  hsinchuPark(){ // 新竹科學園區
    const g = new THREE.Group();
    g.add(padDisc(10, 0x9db6a0));
    const fab = box(9, 4, 6, 0xdde6ea, {metalness:.2, roughness:.4}); fab.position.y = 3.4; g.add(fab);
    const strip = box(9.1, .8, 6.1, 0x2a7fb5); strip.position.y = 4.6; g.add(strip);
    // 巨大矽晶圓
    const wafer = cyl(4, 4, .35, 0xb9c6cf, 32, {metalness:.85, roughness:.15});
    wafer.rotation.x = Math.PI/2;
    wafer.position.set(0, 9.5, 0);
    g.add(wafer);
    const chip = box(1.4,.4,1.4,0x2f3d47,{metalness:.6,roughness:.3}); chip.position.set(0,9.5,0); g.add(chip);
    onFrame(t=>{ wafer.rotation.z = t*0.4; });
    return g;
  },

  smangus(){ // 新竹縣 司馬庫斯神木
    const g = new THREE.Group();
    g.add(padDisc(10, 0x4f7d47));
    const trunk = cyl(1.2, 2.2, 9, 0x6d4c33, 9); trunk.position.y = 5.2; g.add(trunk);
    for(let i=0;i<3;i++){
      const c = cone(5.5-i*1.4, 4.5, 0x2f6e3b, 8);
      c.position.y = 9 + i*2.8;
      g.add(c);
    }
    for(let i=0;i<5;i++){
      const a = i/5*Math.PI*2 + .5;
      const t2 = cyl(.3,.5,3,0x7a5a3d,7); t2.position.set(Math.cos(a)*6.5, 2.8, Math.sin(a)*6.5);
      const c2 = cone(1.7, 3.4, 0x3f8a4c, 7); c2.position.set(Math.cos(a)*6.5, 5.8, Math.sin(a)*6.5);
      g.add(t2, c2);
    }
    return g;
  },

  longteng(){ // 苗栗 龍騰斷橋

    function heart(){
      const s = new THREE.Shape();
      s.moveTo(0, 0);
      s.bezierCurveTo(0,-1.5, -2.5,-1.5, -2.5,0);
      s.bezierCurveTo(-2.5,1.6, 0,2, 0,3.6);
      s.bezierCurveTo(0,2, 2.5,1.6, 2.5,0);
      s.bezierCurveTo(2.5,-1.5, 0,-1.5, 0,0);
      const holePts = new THREE.Path();
      const geo = new THREE.ExtrudeGeometry(s, {depth:.5, bevelEnabled:false});
      geo.rotateX(Math.PI/2);
      const m = mesh(geo, 0x5a5f52);
      return m;
    }
    const h1 = heart(); h1.position.set(6.5, 1.7, 7.5); h1.rotation.y = 2.6; h1.scale.set(1.3,1,1.3);

  { id:"eluanbi",   county:"屏東縣", name:"鵝鑾鼻燈塔",    lat:21.90,  lon:120.85,  build:"eluanbi",   dist:42,

  { id:"penghu",    county:"澎湖縣", name:"七美雙心石滬",  lat:23.24,  lon:119.66,  build:"penghu",    dist:48, sea:true,
    desc:"先民以玄武岩與珊瑚礁在潮間帶堆砌的捕魚陷阱，兩顆心相連的造型浪漫動人，是澎湖最經典的意象。" },
  { id:"kinmen",    county:"金門縣", name:"莒光樓",        lat:24.43,  lon:118.37,  build:"kinmen",    dist:48, sea:true,
    desc:"1952 年建造的三層仿古樓閣，紅柱金瓦氣勢恢弘，曾多次登上郵票，是金門最著名的地標。" },
  { id:"matsu",     county:"連江縣", name:"馬祖藍眼淚",    lat:26.16,  lon:119.93,  build:"matsu",     dist:50, sea:true,
    desc:"春夏夜晚海面會發出夢幻藍光，這是夜光蟲受海浪擾動發光的自然奇觀，被 CNN 列為世界奇景之一。" }
];

/* ---------- 放置地景 ---------- */
const landmarkGroup = new THREE.Group();
scene.add(landmarkGroup);
LANDMARKS.forEach(lm=>{
  const g = builders[lm.build]();
  const y = lm.sea ? SEA_Y : GROUND_Y;
  g.position.set(X(lm.lon), y, Z(lm.lat));
  g.userData.landmark = lm;
  lm.pos = new THREE.Vector3(X(lm.lon), y, Z(lm.lat));
  lm.group = g;
  const label = makeLabel(lm.name);
  const bb = new THREE.Box3().setFromObject(g);
  label.position.set(0, (bb.max.y - y) + 8, 0);
  g.add(label);
  lm.label = label;
  landmarkGroup.add(g);
});

/* ---------- 選取光環 ---------- */
const ring = mesh(new THREE.TorusGeometry(14, .5, 8, 40), 0xffd166,
  {emissive:0xffd166, emissiveIntensity:1.5, transparent:true, opacity:.9});
ring.rotation.x = Math.PI/2;
ring.visible = false;
scene.add(ring);
onFrame((t,dt)=>{
  if(ring.visible){ ring.rotation.z += dt*.8; const s = 1+Math.sin(t*2.5)*.06; ring.scale.set(s,s,1); }
});

/* =========================================================
   無人機飛行控制
   ========================================================= */
const drone = {
  yaw: Math.PI,        // 面向北（-z）→ yaw 使 forward = -z
  pitch: -0.55,
  speedMul: 1,
  keys: {},
  vel: new THREE.Vector3()
};
// 初始視角：面向島嶼
camera.position.set(30, 270, 420);
drone.yaw = 0; drone.pitch = -0.5;

function forwardVec(){
  return new THREE.Vector3(
    Math.sin(drone.yaw)*Math.cos(drone.pitch),
    Math.sin(drone.pitch),
    Math.cos(drone.yaw)*Math.cos(drone.pitch)
  ).negate(); // yaw=PI 時 forward ≈ (0,?,-1)... 直接用 -Z 慣例
}
function applyCam(){
  camera.rotation.order = "YXZ";
  camera.rotation.y = drone.yaw;
  camera.rotation.x = drone.pitch;
}
applyCam();

/* --- 滑鼠拖曳視角 --- */
let dragging = false, lastPX = 0, lastPY = 0;
const cvs = renderer.domElement;

/* --- 自動飛行狀態 --- */
let flight = null;       // {from,to,fromLook,toLook,t,dur,after}
let orbiting = null;     // {target, dist, angle, height}
let orbitMode = false;
let touring = false, tourIdx = 0, tourWait = 0;
let activeLM = null;

function stopAuto(){
  flight = null; orbiting = null;
  if(touring){ touring = false; updateTourBtn(); }
}

function lookDirToYawPitch(dir){
  drone.pitch = Math.asin(THREE.MathUtils.clamp(dir.y, -1, 1));
  drone.yaw = Math.atan2(-dir.x, -dir.z);
}

function flyTo(lm, after){
  const target = lm.pos.clone();
  const d = lm.dist || 45;
  // 從目前位置方向接近
  const horiz = camera.position.clone().sub(target); horiz.y = 0;
  if(horiz.lengthSq() < 1) horiz.set(0.5, 0, 1);
  horiz.normalize();
  const end = target.clone().add(horiz.multiplyScalar(d)).add(new THREE.Vector3(0, d*.55, 0));
  flight = {
    from: camera.position.clone(),
    to: end,
    fromLook: camera.position.clone().add(getViewDir().multiplyScalar(60)),
    toLook: target.clone().add(new THREE.Vector3(0, 6, 0)),
    t: 0,
    dur: Math.min(4, 1.2 + camera.position.distanceTo(end)/220),
    lm, after
  };
  setActive(lm);
}

function getViewDir(){
  const v = new THREE.Vector3(0,0,-1);
  v.applyEuler(new THREE.Euler(drone.pitch, drone.yaw, 0, "YXZ"));
  return v;
}

function setActive(lm){
  activeLM = lm;
  document.querySelectorAll(".item").forEach(el=>el.classList.toggle("active", el.dataset.id === (lm&&lm.id)));
  if(lm){
    ring.visible = true;
    ring.position.set(lm.pos.x, lm.pos.y + 1.2, lm.pos.z);
    document.getElementById("infoCounty").textContent = lm.county;
    document.getElementById("infoName").textContent = lm.name;
    document.getElementById("infoDesc").textContent = lm.desc;
    document.getElementById("info").classList.add("show");
  } else {
    ring.visible = false;
    document.getElementById("info").classList.remove("show");
  }
}

/* =========================================================
   輸入事件
   ========================================================= */
window.addEventListener("keydown", e=>{
  drone.keys[e.code] = true;
  if(["KeyW","KeyA","KeyS","KeyD","Space","ShiftLeft","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)){
    stopAuto();
    if(e.code==="Space") e.preventDefault();
  }
});
window.addEventListener("keyup", e=>{ drone.keys[e.code] = false; });

cvs.addEventListener("wheel", e=>{
  e.preventDefault();
  stopAuto();
  const dir = getViewDir();
  camera.position.addScaledVector(dir, -e.deltaY * 0.12 * drone.speedMul);
  clampCam();
}, {passive:false});

/* --- Pointer：滑鼠拖曳 + 手機雙區觸控 --- */
const touches = {};   // pointerId -> {mode:'look'|'move', x0,y0,x,y}
const stickEl = document.getElementById("stick");
const knobEl = document.getElementById("knob");
let moveVec = {x:0, y:0};

cvs.addEventListener("pointerdown", e=>{
  cvs.setPointerCapture(e.pointerId);
  if(e.pointerType === "touch" && e.clientX < W()*0.42){
    touches[e.pointerId] = {mode:"move", x0:e.clientX, y0:e.clientY, x:e.clientX, y:e.clientY};
    stickEl.style.display = "block";
    stickEl.style.left = (e.clientX-55)+"px";
    stickEl.style.top = (e.clientY-55)+"px";
    stopAuto();
  } else {
    touches[e.pointerId] = {mode:"look", x:e.clientX, y:e.clientY};
    dragging = true;
  }
});
cvs.addEventListener("pointermove", e=>{
  const t = touches[e.pointerId];
  if(!t) return;
  if(t.mode === "look"){
    const dx = e.clientX - t.x, dy = e.clientY - t.y;
    if(Math.abs(dx)+Math.abs(dy) > 1.5 && flight===null){ /* 拖曳中斷自動 */ }
    if(Math.abs(dx)+Math.abs(dy) > 2) { stopAuto(); }
    drone.yaw   -= dx * 0.0032;
    drone.pitch -= dy * 0.0032;
    drone.pitch = THREE.MathUtils.clamp(drone.pitch, -1.45, 1.45);
    t.x = e.clientX; t.y = e.clientY;
    applyCam();
  } else {
    const dx = e.clientX - t.x0, dy = e.clientY - t.y0;
    const r = Math.min(1, Math.hypot(dx,dy)/48);
    const a = Math.atan2(dy,dx);
    moveVec.x = Math.cos(a)*r; moveVec.y = Math.sin(a)*r;
    knobEl.style.transform = `translate(calc(-50% + ${Math.cos(a)*r*34}px), calc(-50% + ${Math.sin(a)*r*34}px))`;
  }
});
function endPointer(e){
  const t = touches[e.pointerId];
  if(t && t.mode === "move"){
    moveVec.x = moveVec.y = 0;
    stickEl.style.display = "none";
    knobEl.style.transform = "translate(-50%,-50%)";
  }
  delete touches[e.pointerId];
  dragging = Object.values(touches).some(t=>t.mode==="look");
}
cvs.addEventListener("pointerup", endPointer);
cvs.addEventListener("pointercancel", endPointer);

/* --- 點擊地景（raycast） --- */
const raycaster = new THREE.Raycaster();
let downXY = null;
cvs.addEventListener("pointerdown", e=>{ downXY = [e.clientX, e.clientY]; });
cvs.addEventListener("pointerup", e=>{
  if(!downXY) return;
  const moved = Math.hypot(e.clientX-downXY[0], e.clientY-downXY[1]);
  downXY = null;
  if(moved > 6) return;
  const ndc = new THREE.Vector2((e.clientX/W())*2-1, -(e.clientY/H())*2+1);
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(landmarkGroup.children, true);
  if(hits.length){
    let o = hits[0].object;
    while(o && !o.userData.landmark) o = o.parent;
    if(o) flyTo(o.userData.landmark, ()=>{ if(orbitMode) startOrbit(o.userData.landmark); });
  }
});

/* --- 高度按鈕（手機） --- */
let altDir = 0;
for(const [id,d] of [["altUp",1],["altDown",-1]]){
  const el = document.getElementById(id);
  el.addEventListener("pointerdown", e=>{ e.preventDefault(); stopAuto(); altDir = d; });
  el.addEventListener("pointerup", ()=>{ altDir = 0; });
  el.addEventListener("pointercancel", ()=>{ altDir = 0; });
}

/* =========================================================
   UI
   ========================================================= */
const listEl = document.getElementById("list");
LANDMARKS.forEach(lm=>{
  const div = document.createElement("div");
  div.className = "item";
  div.dataset.id = lm.id;
  div.innerHTML = `<span class="county">${lm.county}</span><span>${lm.name}</span>`;
  div.addEventListener("click", ()=>{
    touring = false; updateTourBtn();
    flyTo(lm, ()=>{ if(orbitMode) startOrbit(lm); });
    if(W() <= 820) document.getElementById("panel").classList.add("hidden");
  });
  listEl.appendChild(div);
});

document.getElementById("panelToggle").addEventListener("click", ()=>{
  document.getElementById("panel").classList.toggle("hidden");
});
if(W() <= 820) document.getElementById("panel").classList.add("hidden");

document.getElementById("infoClose").addEventListener("click", ()=> setActive(null));

document.getElementById("speed").addEventListener("input", e=>{ drone.speedMul = parseFloat(e.target.value); });

const btnOrbit = document.getElementById("btnOrbit");
btnOrbit.addEventListener("click", ()=>{
  orbitMode = !orbitMode;
  btnOrbit.classList.toggle("on", orbitMode);
  if(orbitMode && activeLM){ startOrbit(activeLM); }
  if(!orbitMode) orbiting = null;
});

const btnTour = document.getElementById("btnTour");
function updateTourBtn(){ btnTour.textContent = touring ? "⏸️ 停止導覽" : "▶️ 自動導覽"; btnTour.classList.toggle("on", touring); }
btnTour.addEventListener("click", ()=>{
  touring = !touring;
  updateTourBtn();
  if(touring){
    tourIdx = activeLM ? Math.max(0, LANDMARKS.indexOf(activeLM)) : 0;
    tourGo();
  } else { stopAuto(); }
});
function tourGo(){
  if(!touring) return;
  const lm = LANDMARKS[tourIdx % LANDMARKS.length];
  flyTo(lm, ()=>{
    startOrbit(lm);
    tourWait = 7;   // 環繞 7 秒後前往下一站
  });
}

document.getElementById("btnHome").addEventListener("click", ()=>{
  stopAuto(); setActive(null);
  flight = {
    from: camera.position.clone(),
    to: new THREE.Vector3(30, 270, 420),
    fromLook: camera.position.clone().add(getViewDir().multiplyScalar(60)),
    toLook: new THREE.Vector3(0, 0, -20),
    t: 0, dur: 2.5
  };
});

function startOrbit(lm){
  const d = (lm.dist || 45);
  const off = camera.position.clone().sub(lm.pos);
  orbiting = {
    target: lm.pos.clone().add(new THREE.Vector3(0,6,0)),
    dist: Math.max(20, Math.hypot(off.x, off.z)),
    height: Math.max(12, off.y),
    angle: Math.atan2(off.z, off.x)
  };
}

function clampCam(){
  camera.position.y = THREE.MathUtils.clamp(camera.position.y, 4, 600);
  camera.position.x = THREE.MathUtils.clamp(camera.position.x, -900, 900);
  camera.position.z = THREE.MathUtils.clamp(camera.position.z, -900, 900);
}

/* =========================================================
   主迴圈
   ========================================================= */
const clock = new THREE.Clock();
const easeInOut = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;

  anims.forEach(fn=>fn(t, dt));

  // 海浪
  for(let i=0;i<seaPos.count;i++){
    const x = seaBase[i*3], y = seaBase[i*3+1];
    seaPos.array[i*3+2] = Math.sin(x*.02 + t*1.2)*Math.cos(y*.025 + t*.9)*1.2;
  }
  seaPos.needsUpdate = true;

  if(flight){
    flight.t += dt / flight.dur;
    const k = easeInOut(Math.min(1, flight.t));
    camera.position.lerpVectors(flight.from, flight.to, k);
    const look = new THREE.Vector3().lerpVectors(flight.fromLook, flight.toLook, k);
    const dir = look.clone().sub(camera.position).normalize();
    lookDirToYawPitch(dir);
    applyCam();
    if(flight.t >= 1){
      const after = flight.after;
      flight = null;
      if(after) after();
    }
  } else if(orbiting){
    orbiting.angle += dt * 0.28;
    camera.position.set(
      orbiting.target.x + Math.cos(orbiting.angle)*orbiting.dist,
      orbiting.target.y + orbiting.height - 6,
      orbiting.target.z + Math.sin(orbiting.angle)*orbiting.dist
    );
    const dir = orbiting.target.clone().sub(camera.position).normalize();
    lookDirToYawPitch(dir);
    applyCam();
    if(touring){
      tourWait -= dt;
      if(tourWait <= 0){ tourIdx = (tourIdx+1) % LANDMARKS.length; tourGo(); }
    }
  } else {
    // 手動飛行
    const sp = 42 * drone.speedMul * dt;
    const fwd = getViewDir();
    const flat = new THREE.Vector3(fwd.x, 0, fwd.z).normalize();
    const right = new THREE.Vector3(-flat.z, 0, flat.x);
    const k = drone.keys;
    if(k["KeyW"]||k["ArrowUp"])    camera.position.addScaledVector(fwd, sp);
    if(k["KeyS"]||k["ArrowDown"])  camera.position.addScaledVector(fwd, -sp);
    if(k["KeyA"]||k["ArrowLeft"])  camera.position.addScaledVector(right, -sp);
    if(k["KeyD"]||k["ArrowRight"]) camera.position.addScaledVector(right, sp);
    if(k["Space"])     camera.position.y += sp;
    if(k["ShiftLeft"]||k["ShiftRight"]) camera.position.y -= sp;
    if(altDir) camera.position.y += altDir * sp * 1.2;
    // 觸控搖桿
    if(moveVec.x || moveVec.y){
      camera.position.addScaledVector(flat, -moveVec.y * sp * 1.4);
      camera.position.addScaledVector(right, moveVec.x * sp * 1.4);
    }
    clampCam();
  }

  renderer.render(scene, camera);
}

window.addEventListener("resize", ()=>{
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

document.getElementById("loading").style.opacity = 0;
setTimeout(()=>document.getElementById("loading").remove(), 600);
animate();
</script>
